<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E8AD0E"/>
      <stop offset="100%" stop-color="#C8960C"/>
    </linearGradient>
  </defs>

  <!-- Dark background -->
  <rect width="64" height="64" rx="12" fill="#080808"/>

  <!-- M text -->
  <text x="32" y="24" text-anchor="middle" font-family="'Arial Black',sans-serif" font-size="18" font-weight="900" letter-spacing="1" fill="url(#g)">M</text>

  <!-- Simplified press machine -->
  <g stroke="url(#g)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Frame top -->
    <rect x="14" y="29" width="36" height="3" rx="1"/>
    <!-- Pillars -->
    <line x1="18" y1="32" x2="18" y2="54"/>
    <line x1="46" y1="32" x2="46" y2="54"/>
    <!-- Rail -->
    <rect x="16" y="36" width="32" height="2.5" rx="1"/>
    <!-- Spindle -->
    <line x1="32" y1="38.5" x2="32" y2="46"/>
    <!-- Tool tip -->
    <polygon points="29,46 35,46 32,51" fill="url(#g)" stroke="none"/>
    <!-- Table -->
    <rect x="22" y="52" width="20" height="3" rx="1" fill="url(#g)" opacity="0.3" stroke="url(#g)" stroke-width="1"/>
    <!-- Base -->
    <line x1="15" y1="57" x2="49" y2="57"/>
  </g>
</svg>